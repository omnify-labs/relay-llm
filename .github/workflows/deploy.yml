# .github/workflows/deploy.yml
name: Deploy relay
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "vendor/litellm"
      - ".gitmodules"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"

concurrency:
  group: deploy-relay
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ghcr.io/omnify-labs/relay-llm:${{ github.sha }}
      - name: Deploy over SSH (pull + blue-green)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            docker pull "ghcr.io/omnify-labs/relay-llm:${{ github.sha }}"
            /srv/relay-llm/deploy.sh "ghcr.io/omnify-labs/relay-llm:${{ github.sha }}"
